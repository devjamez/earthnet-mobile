name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    name: analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: master
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
