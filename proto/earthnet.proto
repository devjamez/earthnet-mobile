// VENDORED copy of earthnet-protocol/proto/earthnet.proto (public, Apache-2.0).
// Kept in sync via protocol_version; the protocol repo holds the conformance vectors.
syntax = "proto3";
package earthnet.v1;

message Location {
  string geohash     = 1;
  uint32 precision_m = 2;
}

enum SourceType {
  SOURCE_TYPE_UNSPECIFIED = 0;
  SOURCE_TYPE_OFFICIAL    = 1;
  SOURCE_TYPE_PHONE       = 2;
}

message Observation {
  uint32     protocol_version   = 1;
  bytes      observation_id     = 2;
  bytes      pubkey             = 3;
  SourceType source_type        = 4;
  string     source_id          = 5;
  int64      captured_at_ns     = 6;
  uint32     clock_uncert_ms    = 7;
  Location   location           = 8;
  float      sta_lta_ratio      = 9;
  bool       p_wave_detected    = 10;
  float      estimated_pga      = 11;
  float      reported_magnitude = 12;
  bytes      signature          = 15;
}

enum EvidenceKind {
  EVIDENCE_KIND_UNSPECIFIED = 0;
  EVIDENCE_KIND_OFFICIAL    = 1;
  EVIDENCE_KIND_CONSENSUS   = 2;
  EVIDENCE_KIND_BOTH        = 3;
}

message ConfirmedEvent {
  uint32   protocol_version = 1;
  bytes    event_id         = 2;
  bytes    pubkey           = 3;
  int64    origin_time_ns   = 4;
  int64    issued_at_ns     = 5;
  Location epicenter        = 6;
  float    depth_km         = 7;
  float    magnitude        = 8;
  float    magnitude_uncert = 9;
  EvidenceKind evidence     = 10;
  uint32   num_observations = 11;
  repeated bytes obs_ids    = 12;
  bytes    supersedes       = 13;
  bytes    signature        = 15;
}
